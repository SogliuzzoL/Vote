<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <title>Résultats</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='style.css') }}"
        />
    </head>
    <body>
        <div class="container">
            <h2>📊 Résultats en direct</h2>
            <p>{{ poll.title }}</p>

            {% for res in resultats %}
            <div class="modpack-card">
                <h3>{{ res.nom }}</h3>
                <p>Score : <strong>{{ res.affichage }}</strong></p>
                {% if poll.vote_type == 'rating' %}
                <p>Calculé sur {{ res.total_votes }} votes individuels.</p>
                {% endif %}
            </div>
            {% endfor %} {% if user and has_voted %}
            <a
                href="{{ url_for('edit_vote', poll_id=poll.id) }}"
                class="btn"
                style="background: #2b8a44"
                >Modifier mon vote</a
            >
            {% endif %}

            <a
                href="{{ url_for('index') }}"
                class="btn"
                style="background: #555"
                >Retour</a
            >
        </div>
    </body>
</html>
